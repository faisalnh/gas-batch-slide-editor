<!doctype html>
<html>
    <head>
        <base target="_top" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            :root {
                --maroon-dark: #6a000d;
                --maroon-light: #a04149;
                --off-white: #f8f8f8;
                --grey-light: #e0e0e0;
                --grey-dark: #333333;
                --text-color: #212121;
                --green: #34a853;
                --red: #ea4335;
            }

            @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap");

            body {
                font-family: "Roboto", sans-serif;
                background-color: var(--grey-dark);
                margin: 0;
                padding: 2rem 1rem;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                min-height: 100vh;
            }

            .container {
                width: 100%;
                max-width: 700px;
                background-color: var(--off-white);
                border-radius: 12px;
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
                padding: 2rem;
                box-sizing: border-box;
            }

            .header {
                text-align: center;
                border-bottom: 1px solid var(--grey-light);
                padding-bottom: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .header img {
                display: block;
                width: 120px;
                max-width: 40%;
                height: auto;
                margin: 0 auto 1rem;
            }

            .header h1 {
                margin: 0;
                color: var(--maroon-dark);
                font-weight: 700;
            }

            #task-selector {
                display: flex;
                justify-content: center;
                gap: 10px;
                margin-bottom: 2rem;
            }

            .task-btn {
                padding: 10px 20px;
                font-size: 1rem;
                font-weight: 500;
                cursor: pointer;
                border: 2px solid var(--maroon-dark);
                background-color: #fff;
                color: var(--maroon-dark);
                border-radius: 20px;
                transition: all 0.3s ease;
            }

            .task-btn:hover {
                background-color: var(--maroon-light);
                color: white;
                border-color: var(--maroon-light);
            }

            .task-btn.active {
                background-color: var(--maroon-dark);
                color: white;
            }

            .task-form {
                display: none;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }

            label {
                display: block;
                margin-bottom: 0.5rem;
                font-weight: 500;
                color: var(--text-color);
            }

            input[type="text"],
            input[type="number"],
            select {
                width: 100%;
                padding: 12px;
                border: 1px solid #ccc;
                border-radius: 8px;
                font-size: 1rem;
                box-sizing: border-box;
                transition:
                    border-color 0.3s,
                    box-shadow 0.3s;
            }
            input:focus {
                outline: none;
                border-color: var(--maroon-dark);
                box-shadow: 0 0 0 3px rgba(106, 0, 13, 0.2);
            }

            .run-button {
                background-color: var(--maroon-dark);
                color: white;
                padding: 14px 20px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 1.1rem;
                font-weight: 500;
                width: 100%;
                margin-top: 1rem;
                transition: background-color 0.3s;
            }
            .run-button:hover {
                background-color: var(--maroon-light);
            }
            .run-button:disabled {
                background-color: #9e9e9e;
                cursor: not-allowed;
            }

            #results-area {
                display: none;
                margin-top: 2rem;
            }
            #status-message {
                padding: 1rem;
                border-radius: 8px;
                font-weight: 500;
                text-align: center;
                margin-bottom: 1rem;
            }
            #status-message.running {
                background-color: #e3f2fd;
                color: #1e88e5;
            }
            #status-message.completed {
                background-color: #e8f5e9;
                color: var(--green);
            }
            #status-message.error {
                background-color: #ffebec;
                color: var(--red);
            }

            #summary-output {
                background: #fff;
                color: var(--text-color);
                padding: 1rem;
                border-radius: 8px;
                border: 1px solid var(--grey-light);
            }

            .summary-grid {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 12px;
                margin-top: 1rem;
            }

            .summary-card {
                background: var(--off-white);
                border: 1px solid var(--grey-light);
                border-radius: 8px;
                padding: 1rem;
                text-align: center;
            }

            .summary-number {
                display: block;
                color: var(--maroon-dark);
                font-size: 1.75rem;
                font-weight: 700;
            }

            .summary-label {
                color: var(--grey-dark);
                font-size: 0.85rem;
            }

            .error-list {
                background: #fff5f5;
                border: 1px solid #ffcdd2;
                border-radius: 8px;
                color: var(--red);
                margin-top: 1rem;
                padding: 1rem;
            }

            .error-list ul {
                margin: 0.5rem 0 0;
                padding-left: 1.25rem;
            }

            .current-file {
                color: var(--grey-dark);
                font-size: 0.9rem;
                margin-top: 0.5rem;
            }
            .loader-container {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
            }
            .dot-loader {
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background-color: var(--maroon-dark);
                animation: dot-pulse 1.4s infinite ease-in-out;
            }
            .dot-loader:nth-child(2) {
                animation-delay: -0.16s;
            }
            .dot-loader:nth-child(3) {
                animation-delay: -0.32s;
            }
            @keyframes dot-pulse {
                0%,
                80%,
                100% {
                    transform: scale(0);
                }
                40% {
                    transform: scale(1);
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <img
                    src="https://millenniaws.sch.id/wp-content/uploads/2021/11/Millennia-World-School-Logo-Only.svg"
                    alt="Millennia World School Logo"
                    width="120"
                    height="120"
                />
                <h1>Slide Deck Batch Editor</h1>
            </div>

            <div id="task-selector">
                <button
                    class="task-btn"
                    onclick="showForm('delete-form', this)"
                >
                    Delete
                </button>
                <button
                    class="task-btn"
                    onclick="showForm('insert-form', this)"
                >
                    Insert
                </button>
                <button
                    class="task-btn"
                    onclick="showForm('replace-form', this)"
                >
                    Replace
                </button>
                <button
                    class="task-btn"
                    onclick="showForm('text-replace-form', this)"
                >
                    Text Replace
                </button>
                <button
                    class="task-btn"
                    onclick="showForm('file-name-replace-form', this)"
                >
                    File Name Replace
                </button>
            </div>

            <!-- FORMS -->
            <div id="delete-form" class="task-form">
                <div class="form-group">
                    <label for="deleteFolderUrl">Folder URL</label
                    ><input
                        type="text"
                        id="deleteFolderUrl"
                        placeholder="Paste Google Drive Folder URL"
                    />
                </div>
                <div class="form-group">
                    <label for="startSlide">Start Slide to Delete</label
                    ><input type="number" id="startSlide" min="1" value="35" />
                </div>
                <div class="form-group">
                    <label for="endSlide">End Slide to Delete</label
                    ><input type="number" id="endSlide" min="1" value="35" />
                </div>
                <button class="run-button" onclick="runTask('startDeleteTask')">
                    Run Deletion
                </button>
            </div>

            <div id="insert-form" class="task-form">
                <div class="form-group">
                    <label for="insertSourceUrl">Source Presentation URL</label
                    ><input
                        type="text"
                        id="insertSourceUrl"
                        placeholder="Presentation with the slide(s) to copy"
                    />
                </div>
                <div class="form-group">
                    <label for="insertSourceStart">Source Start Slide</label
                    ><input
                        type="number"
                        id="insertSourceStart"
                        min="1"
                        value="1"
                    />
                </div>
                <div class="form-group">
                    <label for="insertSourceEnd">Source End Slide</label
                    ><input
                        type="number"
                        id="insertSourceEnd"
                        min="1"
                        value="1"
                    />
                </div>
                <div class="form-group">
                    <label for="insertDestFolderUrl"
                        >Destination Folder URL</label
                    ><input
                        type="text"
                        id="insertDestFolderUrl"
                        placeholder="Folder to modify"
                    />
                </div>
                <div class="form-group">
                    <label for="insertDestPosition"
                        >Destination Position (0 or blank to append)</label
                    ><input
                        type="number"
                        id="insertDestPosition"
                        min="0"
                        placeholder="Append to end"
                    />
                </div>
                <button class="run-button" onclick="runTask('startInsertTask')">
                    Run Insertion
                </button>
            </div>

            <div id="replace-form" class="task-form">
                <div class="form-group">
                    <label for="replaceTargetFolderUrl"
                        >Target Folder URL (Files to update)</label
                    ><input
                        type="text"
                        id="replaceTargetFolderUrl"
                        placeholder="Folder with presentations to be updated"
                    />
                </div>
                <div class="form-group">
                    <label for="replaceSourceFolderUrl"
                        >Source Folder URL (Files with new slide)</label
                    ><input
                        type="text"
                        id="replaceSourceFolderUrl"
                        placeholder="Folder containing the replacement slides"
                    />
                </div>
                <div class="form-group">
                    <label for="replaceTargetSlideNum"
                        >Slide Number to Replace</label
                    ><input
                        type="number"
                        id="replaceTargetSlideNum"
                        min="1"
                        value="1"
                    />
                </div>
                <div class="form-group">
                    <label for="replaceSourceSlideNum"
                        >Slide Number to Copy</label
                    ><input
                        type="number"
                        id="replaceSourceSlideNum"
                        min="1"
                        value="1"
                    />
                </div>
                <button
                    class="run-button"
                    onclick="runTask('startReplaceTask')"
                >
                    Run Replacement
                </button>
            </div>

            <div id="text-replace-form" class="task-form">
                <div class="form-group">
                    <label for="textReplaceFolderUrl">Target Folder URL</label
                    ><input
                        type="text"
                        id="textReplaceFolderUrl"
                        placeholder="Folder with presentations to update"
                    />
                </div>
                <div class="form-group">
                    <label for="findText">Find Text</label
                    ><input
                        type="text"
                        id="findText"
                        placeholder="Text to search for"
                    />
                </div>
                <div class="form-group">
                    <label for="replaceWithText">Replace With</label
                    ><input
                        type="text"
                        id="replaceWithText"
                        placeholder="Replacement text"
                    />
                </div>
                <div class="form-group">
                    <label for="textReplaceScope">Apply To</label>
                    <select
                        id="textReplaceScope"
                        onchange="toggleTextReplaceSlideNumber()"
                    >
                        <option value="all">All slides</option>
                        <option value="specific">Specific slide</option>
                    </select>
                </div>
                <div
                    class="form-group"
                    id="textReplaceSlideNumberGroup"
                    style="display: none"
                >
                    <label for="textReplaceSlideNumber">Slide Number</label
                    ><input
                        type="number"
                        id="textReplaceSlideNumber"
                        min="1"
                        value="1"
                    />
                </div>
                <div class="form-group">
                    <label
                        ><input type="checkbox" id="matchCase" /> Match
                        case</label
                    >
                </div>
                <button
                    class="run-button"
                    onclick="runTask('startTextReplaceTask')"
                >
                    Run Text Replacement
                </button>
            </div>

            <div id="file-name-replace-form" class="task-form">
                <div class="form-group">
                    <label for="fileNameReplaceFolderUrl"
                        >Target Folder URL</label
                    ><input
                        type="text"
                        id="fileNameReplaceFolderUrl"
                        placeholder="Folder with presentations to rename"
                    />
                </div>
                <div class="form-group">
                    <label for="fileNameFindText">Find Text in File Name</label
                    ><input
                        type="text"
                        id="fileNameFindText"
                        placeholder="Text to search for in file names"
                    />
                </div>
                <div class="form-group">
                    <label for="fileNameReplaceWithText">Replace With</label
                    ><input
                        type="text"
                        id="fileNameReplaceWithText"
                        placeholder="Replacement text; leave blank to remove"
                    />
                </div>
                <div class="form-group">
                    <label
                        ><input type="checkbox" id="fileNameMatchCase" /> Match
                        case</label
                    >
                </div>
                <button
                    class="run-button"
                    onclick="runTask('startFileNameReplaceTask')"
                >
                    Run File Name Replacement
                </button>
            </div>

            <!-- RESULTS AREA -->
            <div id="results-area">
                <div id="status-message"></div>
                <div id="summary-output"></div>
            </div>
        </div>

        <script>
            let pollInterval = null;

            document.addEventListener("DOMContentLoaded", () => {
                showForm("delete-form", document.querySelector(".task-btn"));
            });

            function showForm(formId, buttonElement) {
                document
                    .querySelectorAll(".task-form")
                    .forEach((form) => (form.style.display = "none"));
                document
                    .querySelectorAll(".task-btn")
                    .forEach((btn) => btn.classList.remove("active"));
                document.getElementById(formId).style.display = "block";
                buttonElement.classList.add("active");
                resetUI();
            }

            function resetUI() {
                clearInterval(pollInterval);
                document.getElementById("results-area").style.display = "none";
                document
                    .querySelectorAll(".run-button")
                    .forEach((btn) => (btn.disabled = false));
            }

            function getFormData(taskType) {
                if (taskType === "startDeleteTask") {
                    return {
                        deleteFolderUrl:
                            document.getElementById("deleteFolderUrl").value,
                        startSlide: document.getElementById("startSlide").value,
                        endSlide: document.getElementById("endSlide").value,
                    };
                }
                if (taskType === "startInsertTask") {
                    return {
                        insertSourceUrl:
                            document.getElementById("insertSourceUrl").value,
                        insertSourceStart:
                            document.getElementById("insertSourceStart").value,
                        insertSourceEnd:
                            document.getElementById("insertSourceEnd").value,
                        insertDestFolderUrl: document.getElementById(
                            "insertDestFolderUrl",
                        ).value,
                        insertDestPosition:
                            document.getElementById("insertDestPosition").value,
                    };
                }
                if (taskType === "startReplaceTask") {
                    return {
                        replaceTargetFolderUrl: document.getElementById(
                            "replaceTargetFolderUrl",
                        ).value,
                        replaceSourceFolderUrl: document.getElementById(
                            "replaceSourceFolderUrl",
                        ).value,
                        replaceTargetSlideNum: document.getElementById(
                            "replaceTargetSlideNum",
                        ).value,
                        replaceSourceSlideNum: document.getElementById(
                            "replaceSourceSlideNum",
                        ).value,
                    };
                }
                if (taskType === "startTextReplaceTask") {
                    return {
                        textReplaceFolderUrl: document.getElementById(
                            "textReplaceFolderUrl",
                        ).value,
                        findText: document.getElementById("findText").value,
                        replaceWithText:
                            document.getElementById("replaceWithText").value,
                        textReplaceScope:
                            document.getElementById("textReplaceScope").value,
                        textReplaceSlideNumber: document.getElementById(
                            "textReplaceSlideNumber",
                        ).value,
                        matchCase: document.getElementById("matchCase").checked,
                    };
                }
                if (taskType === "startFileNameReplaceTask") {
                    return {
                        fileNameReplaceFolderUrl: document.getElementById(
                            "fileNameReplaceFolderUrl",
                        ).value,
                        fileNameFindText:
                            document.getElementById("fileNameFindText").value,
                        fileNameReplaceWithText: document.getElementById(
                            "fileNameReplaceWithText",
                        ).value,
                        fileNameMatchCase:
                            document.getElementById("fileNameMatchCase")
                                .checked,
                    };
                }
            }

            function toggleTextReplaceSlideNumber() {
                const scope = document.getElementById("textReplaceScope").value;
                const group = document.getElementById(
                    "textReplaceSlideNumberGroup",
                );
                group.style.display = scope === "specific" ? "block" : "none";
            }

            function runTask(taskFunction) {
                const formData = getFormData(taskFunction);
                if (hasMissingRequiredFields(taskFunction, formData)) {
                    if (
                        !confirm(
                            "One or more required fields are empty. Continue anyway?",
                        )
                    ) {
                        return;
                    }
                }

                setUILoading();

                google.script.run
                    .withSuccessHandler((response) => {
                        if (response.jobId) {
                            pollForLogs(response.jobId);
                        } else {
                            handleFinalState({
                                status: "error",
                                log: "Failed to start job. No Job ID returned.",
                            });
                        }
                    })
                    .withFailureHandler((error) => {
                        handleFinalState({
                            status: "error",
                            log:
                                "An unexpected script error occurred: " +
                                error.message,
                        });
                    })
                    [taskFunction](formData);
            }

            function hasMissingRequiredFields(taskFunction, formData) {
                const requiredFieldsByTask = {
                    startDeleteTask: [
                        "deleteFolderUrl",
                        "startSlide",
                        "endSlide",
                    ],
                    startInsertTask: [
                        "insertSourceUrl",
                        "insertSourceStart",
                        "insertSourceEnd",
                        "insertDestFolderUrl",
                    ],
                    startReplaceTask: [
                        "replaceTargetFolderUrl",
                        "replaceSourceFolderUrl",
                        "replaceTargetSlideNum",
                        "replaceSourceSlideNum",
                    ],
                    startTextReplaceTask: ["textReplaceFolderUrl", "findText"],
                    startFileNameReplaceTask: [
                        "fileNameReplaceFolderUrl",
                        "fileNameFindText",
                    ],
                };
                const requiredFields = requiredFieldsByTask[taskFunction] || [];

                return requiredFields.some(
                    (field) =>
                        formData[field] === "" ||
                        formData[field] === null ||
                        formData[field] === undefined,
                );
            }

            function setUILoading() {
                document
                    .querySelectorAll(".run-button")
                    .forEach((btn) => (btn.disabled = true));
                const resultsArea = document.getElementById("results-area");
                const statusMessage = document.getElementById("status-message");
                const summaryOutput = document.getElementById("summary-output");

                statusMessage.className = "running";
                statusMessage.innerHTML = `<div class="loader-container"><span>Processing...</span><div class="dot-loader"></div><div class="dot-loader"></div><div class="dot-loader"></div></div>`;
                renderSummary({
                    message: "Waiting for process to start...",
                    processedFiles: 0,
                    editedFiles: 0,
                    skippedFiles: 0,
                    errorFiles: 0,
                    totalChanges: 0,
                    currentFile: "",
                    errors: [],
                });
                resultsArea.style.display = "block";
            }

            function pollForLogs(jobId) {
                pollInterval = setInterval(() => {
                    google.script.run
                        .withSuccessHandler((response) => {
                            renderSummary(response.summary || {});

                            if (
                                response.status === "completed" ||
                                response.status === "error"
                            ) {
                                handleFinalState(response);
                            }
                        })
                        .getLogUpdates(jobId);
                }, 1500);
            }

            function renderSummary(summary) {
                const summaryOutput = document.getElementById("summary-output");
                const errors = summary.errors || [];
                const visibleErrors = errors.slice(0, 10);
                const currentFile = summary.currentFile
                    ? `<div class="current-file">Current file: ${escapeHtml(summary.currentFile)}</div>`
                    : "";
                const errorMarkup = errors.length
                    ? `<div class="error-list"><strong>Errors (${errors.length})</strong><ul>${visibleErrors.map((error) => `<li>${escapeHtml(error)}</li>`).join("")}</ul>${errors.length > visibleErrors.length ? `<div class="current-file">Showing first ${visibleErrors.length} errors only.</div>` : ""}</div>`
                    : "";

                summaryOutput.innerHTML = `
                    <div><strong>${escapeHtml(summary.message || "Processing...")}</strong></div>
                    ${currentFile}
                    <div class="summary-grid">
                        <div class="summary-card"><span class="summary-number">${summary.processedFiles || 0}</span><span class="summary-label">Slides files processed</span></div>
                        <div class="summary-card"><span class="summary-number">${summary.editedFiles || 0}</span><span class="summary-label">Slides files edited successfully</span></div>
                        <div class="summary-card"><span class="summary-number">${summary.skippedFiles || 0}</span><span class="summary-label">Slides files skipped</span></div>
                        <div class="summary-card"><span class="summary-number">${summary.errorFiles || 0}</span><span class="summary-label">Errors</span></div>
                    </div>
                    <div class="current-file">Total changes made: ${summary.totalChanges || 0}</div>
                    ${errorMarkup}
                `;
            }

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function handleFinalState(response) {
                clearInterval(pollInterval);
                renderSummary(response.summary || {});
                const statusMessage = document.getElementById("status-message");
                statusMessage.className = response.status;
                statusMessage.textContent =
                    response.status === "error"
                        ? "Completed with Errors"
                        : response.status.charAt(0).toUpperCase() +
                          response.status.slice(1);
                document
                    .querySelectorAll(".run-button")
                    .forEach((btn) => (btn.disabled = false));
            }
        </script>
    </body>
</html>
